name: API Contract Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  contract-tests:
    name: Run API Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Run contract tests
        run: cargo test --test contract_tests -- --nocapture

      - name: Generate contract test report
        if: always()
        run: cargo test --test contract_tests -- --nocapture --test-threads=1 2>&1 | tee contract-test-report.txt

      - name: Upload contract test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: contract-test-report
          path: contract-test-report.txt

      - name: Check schema compatibility
        run: |
          echo "Verifying backward compatibility of API schemas..."
          cargo test --test contract_tests schema_compatibility -- --nocapture

  integration-contract-tests:
    name: Run Integration Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soroban_pulse_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Set up test database
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/soroban_pulse_test
        run: |
          until pg_isready -h localhost -p 5432; do
            echo 'Waiting for PostgreSQL...'
            sleep 1
          done

      - name: Run integration contract tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/soroban_pulse_test
        run: cargo test --test contract_tests integration_contract_tests -- --nocapture --test-threads=1

      - name: Verify provider states
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/soroban_pulse_test
        run: cargo test --test contract_tests provider_states -- --nocapture

  compatibility-report:
    name: Generate Compatibility Report
    runs-on: ubuntu-latest
    needs: [contract-tests]
    if: always()

    steps:
      - name: Download contract test report
        uses: actions/download-artifact@v3
        with:
          name: contract-test-report

      - name: Generate compatibility summary
        run: |
          echo "# API Contract Test Summary" > compatibility-summary.md
          echo "" >> compatibility-summary.md
          echo "## Test Results" >> compatibility-summary.md
          echo '```' >> compatibility-summary.md
          cat contract-test-report.txt >> compatibility-summary.md
          echo '```' >> compatibility-summary.md

      - name: Comment on PR with compatibility results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('compatibility-summary.md', 'utf8');

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            } catch (error) {
              console.log('Could not generate compatibility comment:', error);
            }
